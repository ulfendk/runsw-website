<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RU Nielsen Software — Architecture · Consulting</title>
  <script>
    /* Set language before paint to avoid flash */
    var _da = (navigator.language || '').startsWith('da');
    document.documentElement.lang = _da ? 'da' : 'en';
    document.documentElement.className = _da ? 'lang-da' : 'lang-en';
  </script>
  <style>
    :root {
      --navy:   #0B1929;
      --navy-mid: #1D3A5C;
      --blue:   #2E9EF4;
      --muted:  #8AA3BC;
      --border: #D5DDE8;
      --bg:     #F7FAFD;
      --font:   'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Language switching */
    .lang-en [lang="da"],
    .lang-da [lang="en"] { display: none; }

    main {
      width: 100%;
      max-width: 680px;
      padding: 5rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      flex: 1;
    }

    /* Logo */
    .logo {
      width: 100%;
      max-width: 460px;
    }
    .logo img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Accent rule */
    .rule {
      width: 84px;
      height: 3px;
      border-radius: 2px;
      background: var(--blue);
    }

    /* Contact card */
    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
      text-align: center;
      width: 100%;
    }

    .contact-heading {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--navy);
      text-decoration: none;
      transition: color 0.15s;
    }
    .contact-link:hover { color: var(--blue); }

    .contact-link svg {
      width: 17px;
      height: 17px;
      fill: var(--muted);
      flex-shrink: 0;
      transition: fill 0.15s;
    }
    .contact-link:hover svg { fill: var(--blue); }

    /* Footer */
    footer {
      padding: 2rem;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--border);
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">
      <img
        src="ru-nielsen-software-logo.svg"
        alt="RU Nielsen Software — Architecture Consulting"
        width="800"
        height="194"
      />
    </div>

    <div class="rule" aria-hidden="true"></div>

    <section class="contact" aria-labelledby="contact-heading">
      <h1 id="contact-heading" class="contact-heading">
        <span lang="da">Kontakt</span>
        <span lang="en">Contact</span>
      </h1>

      <div class="contact-links">
        <a class="contact-link" href="mailto:info@runsw.dk">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 2-8 5-8-5h16zm0 12H4V8.236l8 5 8-5V18z"/>
          </svg>
          Email
        </a>

        <!-- TODO: replace # with the real LinkedIn profile URL -->
        <a class="contact-link" href="https://www.linkedin.com/company/runsw" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20.447 20.452H17.1v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.767V9.016h3.202v1.561h.046c.446-.846 1.535-1.736 3.16-1.736 3.379 0 4.003 2.224 4.003 5.116v6.495zM5.337 7.433a1.857 1.857 0 110-3.714 1.857 1.857 0 010 3.714zM6.97 20.452H3.7V9.016h3.27v11.436zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.226.792 24 1.771 24h20.451C23.2 24 24 23.226 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
          LinkedIn
        </a>
      </div>
    </section>
  </main>

  <footer>
    &copy; <span id="yr"></span> RU Nielsen Software
    <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
  </footer>
</body>
</html>
